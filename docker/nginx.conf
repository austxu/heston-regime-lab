# nginx config for the production frontend image.
# Serves the built SPA and reverse-proxies the API + WebSocket to the `api` service so the
# browser talks to a single same-origin host (no CORS in production).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST API.
    location /api/ {
        proxy_pass http://${API_HOST}:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Health check.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    # WebSocket calibration stream (needs HTTP/1.1 upgrade headers).
    location /ws/ {
        proxy_pass http://${API_HOST}:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: all other routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
