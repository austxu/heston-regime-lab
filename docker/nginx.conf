# nginx config for the production frontend image.
# Serves the built SPA and reverse-proxies the API + WebSocket to the `api` service so the
# browser talks to a single same-origin host (no CORS in production).

# Trust boundary for client identity. Direct/local deployments ignore inbound identity
# headers and use the socket peer. Railway sets TRUST_UPSTREAM_PROXY=1 because its edge
# overwrites X-Real-IP with the real client before forwarding to this private nginx service.
# Accept only a single IP-shaped token here; the API performs the final IP validation.
map $http_x_real_ip $edge_client_ip {
    default "";
    ~^[0-9A-Fa-f:.]+$ $http_x_real_ip;
}

map "${TRUST_UPSTREAM_PROXY}:$edge_client_ip" $normalized_client_ip {
    default $remote_addr;
    ~*^(?:1|true|yes|on):[0-9A-Fa-f:.]+$ $edge_client_ip;
}

map "${TRUST_UPSTREAM_PROXY}:$http_x_forwarded_proto" $normalized_forwarded_proto {
    default $scheme;
    ~*^(?:1|true|yes|on):https$ https;
    ~*^(?:1|true|yes|on):http$ http;
}

server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Resolve the private API hostname at request time so an API-only redeploy can
    # change addresses without requiring an nginx restart. Docker uses 127.0.0.11;
    # Railway exposes its project-scoped resolver at fd12::10.
    resolver ${DNS_RESOLVER} valid=10s ipv6=on;
    resolver_timeout 5s;
    set $api_backend "http://${API_HOST}:${API_PORT}";

    # Conservative browser defaults for the static dashboard.  CSP permits the app's
    # same-origin API/WebSocket connections and Plotly's inline styles.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http: https: ws: wss:; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    client_max_body_size 1m;

    # Compress the large Plotly bundle and other text assets. API responses that FastAPI
    # already gzips carry Content-Encoding and are not compressed a second time.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    # REST API.
    location /api/ {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $normalized_client_ip;
        proxy_set_header X-Forwarded-For $normalized_client_ip;
        proxy_set_header X-Forwarded-Proto $normalized_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # The dashboard consumes the API health response. Container/platform health checks use
    # `/`, so this route must be proxied rather than returning nginx-only plain text.
    location = /health {
        access_log off;
        proxy_pass $api_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $normalized_client_ip;
        proxy_set_header X-Forwarded-For $normalized_client_ip;
        proxy_set_header X-Forwarded-Proto $normalized_forwarded_proto;
    }

    # WebSocket calibration stream (needs HTTP/1.1 upgrade headers).
    location /ws/ {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $normalized_client_ip;
        proxy_set_header X-Forwarded-For $normalized_client_ip;
        proxy_set_header X-Forwarded-Proto $normalized_forwarded_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Vite fingerprints bundled assets, so they can be cached for a year.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    # SPA fallback: all other routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
