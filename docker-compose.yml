# Local stack: React frontend + FastAPI service + Redis cache.
#
#   docker compose up --build
#   open http://localhost:3000     (dashboard; nginx proxies /api + /ws to the api service)
#   open http://localhost:8000/docs (API docs)
#
# Set FRED_API_KEY in the environment (or a .env file) to enable the live FRED rate;
# without it the API uses the config risk-free constant. Set HRL_OFFLINE=1 to force the
# synthetic data path (no network required).
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # ephemeral cache
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      FRED_API_KEY: ${FRED_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      UVICORN_HOST: ${UVICORN_HOST:-0.0.0.0}
      # Deterministic by default. Set HRL_OFFLINE=0 to opt into live market requests.
      HRL_OFFLINE: ${HRL_OFFLINE:-1}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "127.0.0.1:3000:80"
    environment:
      API_HOST: api
      API_PORT: "8000"
      DNS_RESOLVER: "${DNS_RESOLVER:-127.0.0.11}"
      # Local/direct mode must ignore user-supplied forwarding headers.
      TRUST_UPSTREAM_PROXY: "${TRUST_UPSTREAM_PROXY:-0}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
