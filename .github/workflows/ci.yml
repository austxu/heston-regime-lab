name: CI

# Runs on every push to the default branch and on every pull request. PRs run tests +
# type-checking only (no Docker build, no deploy — that's deploy.yml on push).
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install OpenMP runtime (xgboost)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          HRL_OFFLINE: '1'   # deterministic, no network
        run: pytest tests/ -q

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build   # also verify the production bundle builds

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    # Validate images build on pushes (Railway builds its own on deploy). PRs skip this.
    if: github.event_name == 'push'
    needs: [python-tests, frontend-typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t hrl-api:ci .
      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t hrl-frontend:ci .
