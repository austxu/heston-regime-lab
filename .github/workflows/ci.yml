name: CI

# Runs the deterministic Python suite, static checks, frontend build, and production image
# builds on every pull request and default-branch push.
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    name: Python quality + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install OpenMP runtime (xgboost)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check
      - name: Lint Python
        run: |
          ruff check .
          ruff format --check .
      - name: Run tests
        env:
          HRL_OFFLINE: '1'   # deterministic, no network
          REDIS_URL: ''      # never let CI mutate an externally configured cache
        run: python -m pytest -q

  frontend-typecheck:
    name: Frontend quality + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build   # also verify the production bundle builds

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [python-tests, frontend-typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t hrl-api:ci .
      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t hrl-frontend:ci .
