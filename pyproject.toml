[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["frontend"]

[tool.ruff.lint]
# Keep CI focused on definite errors, unused/import hygiene, and syntax/readability traps.
# Formatting remains opt-in, avoiding a repository-wide style-only rewrite.
select = ["E4", "E7", "E9", "F", "I"]
